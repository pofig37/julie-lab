<!DOCTYPE html>
<html>
<head>
  <title>Julie's Lab</title>
  <style>
    body {
      background: linear-gradient(135deg, #ffe3f1, #fff6d5, #d9fbe0, #d6f0ff, #ecdcff);
      background-attachment: fixed;
      text-align: center;
      font-family: sans-serif;
      margin: 0;
      padding: 40px 20px;
    }
    h1 {
      font-family: "Comic Sans MS", cursive, sans-serif;
      font-size: 2.8em;
      font-weight: bold;
      background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8b00ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
    }
    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 24px;
      margin-top: 30px;
    }
    .card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 220px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
      text-decoration: none;
      color: #333;
      transition: transform 0.15s ease;
    }
    .card:hover {
      transform: scale(1.05);
    }
    .card .icon {
      font-size: 3em;
    }
    .card .name {
      font-weight: bold;
      font-size: 1.2em;
      margin-top: 10px;
      color: #b83bff;
    }
  </style>
</head>
<body>
  <h1>Julie's Lab</h1>
  <div class="gallery">
    <a class="card" href="doodle-dazzle/index.html">
      <div class="icon">🦊✨</div>
      <div class="name">Doodle Dazzle</div>
    </a>
  </div>
</body>
</html>
