<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dazzle's Comic Strip</title>
  <style>
    body {
      background: linear-gradient(135deg, #ffe3f1, #fff6d5, #d9fbe0, #d6f0ff, #ecdcff);
      background-attachment: fixed;
      text-align: center;
      font-family: sans-serif;
      margin: 0;
      padding: 30px 20px;
    }
    h1 {
      font-family: "Comic Sans MS", cursive, sans-serif;
      font-size: 2em;
      font-weight: bold;
      background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8b00ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      display: inline-block;
    }
    .panel {
      display: inline-flex;
      align-items: center;
      gap: 16px;
      background: white;
      border: 4px solid #333;
      border-radius: 14px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
      padding: 24px;
      max-width: 500px;
      min-height: 140px;
    }
    .character {
      font-size: 3.5em;
    }
    .bubble {
      background: #f5eaff;
      border: 3px solid #b83bff;
      border-radius: 16px;
      padding: 14px 18px;
      font-weight: bold;
      color: #333;
      font-size: 1.1em;
      text-align: left;
    }
    #counter {
      font-weight: bold;
      color: #b83bff;
      margin-top: 14px;
    }
    button {
      background: linear-gradient(135deg, #ff9a3b, #ff3bb0);
      border: none;
      border-radius: 12px;
      padding: 10px 24px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1em;
      color: white;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
      transition: transform 0.1s ease;
      margin-top: 16px;
    }
    button:hover {
      transform: scale(1.06);
    }
    button:disabled {
      opacity: 0.4;
      cursor: default;
      transform: none;
    }
    .floaty {
      position: absolute;
      font-size: 2em;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .content {
      position: relative;
      z-index: 1;
    }
    .about {
      max-width: 460px;
      margin: 40px auto 0;
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    }
    .about h2 {
      color: #b83bff;
      margin-top: 0;
    }
    .about a {
      display: inline-block;
      margin-top: 10px;
      background: linear-gradient(135deg, #3bb8ff, #3bff6e);
      color: white;
      font-weight: bold;
      text-decoration: none;
      padding: 8px 18px;
      border-radius: 10px;
    }
  </style>
</head>
<body>
  <div class="content">
    <h1>🦊✨ Dazzle Explains Doodle Dazzle</h1>
    <div>
      <div class="panel">
        <div class="character" id="character"></div>
        <div class="bubble" id="bubble"></div>
      </div>
    </div>
    <div id="counter"></div>
    <div>
      <button id="nextButton">Next ▶</button>
    </div>

    <div class="about">
      <h2>About Doodle Dazzle</h2>
      <p>Doodle Dazzle is a colorful drawing app with a new idea to draw every day, a paint bucket fill, and an eraser — made by Julie. Works on computers, phones, and tablets!</p>
      <a href="https://pofig37.github.io/julie-lab/doodle-dazzle/">Try Doodle Dazzle</a>
    </div>
  </div>

  <script>
    const floatyEmojis = ["🦊", "✨", "🎉"];
    for (let i = 0; i < 40; i++) {
      const el = document.createElement("div");
      el.className = "floaty";
      el.textContent = floatyEmojis[Math.floor(Math.random() * floatyEmojis.length)];
      el.style.left = Math.random() * 95 + "%";
      el.style.top = Math.random() * 100 + "%";
      el.style.transform = "rotate(" + (Math.random() * 60 - 30) + "deg)";
      document.body.appendChild(el);
    }
  </script>
  <script>
    const panels = [
      { character: "🦊", text: "Hey Wolf! I want to tell you something super cool. It's amazing! You're gonna be so excited when you hear this!" },
      { character: "🐺", text: "I can't wait!" },
      { character: "🦊", text: "Well, I created this awesome app called Doodle Dazzle! It's the best app you'll ever find!" },
      { character: "🦊", text: "It's a drawing app that gives you a new idea to draw every day, has awesome color combos, and even has a fox with dazzle sparkles as its icon!" },
      { character: "🐺", text: "Sounds awesome... pawsome!" },
      { character: "🦊", text: "That's not the end! It has a beautiful background that would always make you feel happy!" },
      { character: "🦊", text: "Thank you, Wolf, for listening. Bye!!! I hope you come check out my drawing app!" }
    ];

    let current = 0;
    const characterEl = document.getElementById("character");
    const bubbleEl = document.getElementById("bubble");
    const counterEl = document.getElementById("counter");
    const nextButton = document.getElementById("nextButton");

    function showPanel(index) {
      characterEl.textContent = panels[index].character;
      bubbleEl.textContent = panels[index].text;
      counterEl.textContent = "Panel " + (index + 1) + " of " + panels.length;
      if (index === panels.length - 1) {
        nextButton.textContent = "The End! 🎉";
        nextButton.disabled = true;
      }
    }

    nextButton.addEventListener("click", function() {
      current = current + 1;
      showPanel(current);
    });

    showPanel(current);
  </script>
</body>
</html>
