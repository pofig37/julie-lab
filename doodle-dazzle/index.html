<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doodle Dazzle</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2280%22>🦊✨</text></svg>">
  <style>
    body {
      background: linear-gradient(135deg, #ffe3f1, #fff6d5, #d9fbe0, #d6f0ff, #ecdcff);
      background-attachment: fixed;
      text-align: center;
      font-family: sans-serif;
    }
    h1 {
      display: inline-block;
      font-family: "Comic Sans MS", cursive, sans-serif;
      font-size: 3em;
      font-weight: bold;
      text-transform: uppercase;
      background: linear-gradient(90deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #8b00ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    #promptText {
      font-weight: bold;
      color: #b83bff;
      font-size: 1.2em;
    }
    canvas {
      background: white;
      border: 4px solid #333;
      border-radius: 14px;
      cursor: crosshair;
      touch-action: none;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
      max-width: 100%;
      height: auto;
    }
    button {
      background: linear-gradient(135deg, #ff9a3b, #ff3bb0);
      border: none;
      border-radius: 12px;
      padding: 8px 16px;
      cursor: pointer;
      font-weight: bold;
      font-size: 1em;
      color: white;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.2);
      transition: transform 0.1s ease;
    }
    button:hover {
      transform: scale(1.06);
    }
    #fillButton {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      background: linear-gradient(135deg, #3bb8ff, #3bff6e);
      vertical-align: middle;
    }
    #fillButton span.icon {
      font-size: 1.8em;
    }
    input[type="range"] {
      accent-color: #ff3bb0;
    }
    input[type="color"] {
      border: none;
      border-radius: 8px;
      width: 40px;
      height: 30px;
      vertical-align: middle;
    }
    label {
      font-weight: bold;
      color: #b83bff;
    }
  </style>
</head>
<body>
  <h1>🦊✨ Doodle Dazzle</h1>
  <p id="promptText">Today's idea: ...</p>
  <p>
    <label>Color: <input type="color" id="colorPicker" value="#000000"></label>
    &nbsp;&nbsp;
    <label>Brush size: <input type="range" id="brushSize" min="1" max="30" value="4"></label>
    &nbsp;&nbsp;
    <button id="eraserButton">Eraser</button>
    &nbsp;&nbsp;
    <label>Eraser size: <input type="range" id="eraserSize" min="5" max="60" value="20"></label>
    &nbsp;&nbsp;
    <button id="fillButton"><span class="icon">🪣</span><span>Fill</span></button>
  </p>
  <canvas id="canvas" width="600" height="400"></canvas>

  <script>
    const drawingIdeas = [
      "a dragon riding a bicycle",
      "your dream treehouse",
      "an underwater city",
      "a robot walking a dog",
      "a castle made of candy",
      "a spaceship exploring a new planet",
      "your favorite animal wearing a superhero cape",
      "a garden on the moon",
      "a monster who loves flowers",
      "a pizza with the wildest toppings ever",
      "a mermaid's bedroom",
      "a dinosaur playing a video game",
      "a house shaped like a shoe",
      "a jellyfish wearing sunglasses",
      "a treasure map to somewhere secret"
    ];

    const dayNumber = Math.floor(Date.parse(new Date().toDateString()) / 86400000);
    const todaysIdea = drawingIdeas[dayNumber % drawingIdeas.length];
    document.getElementById("promptText").textContent = "Today's idea: " + todaysIdea;

    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const colorPicker = document.getElementById("colorPicker");
    const brushSize = document.getElementById("brushSize");
    const eraserButton = document.getElementById("eraserButton");
    const eraserSize = document.getElementById("eraserSize");
    const fillButton = document.getElementById("fillButton");
    let isDrawing = false;
    let isErasing = false;
    let lastX = 0;
    let lastY = 0;

    // canvas can be shown smaller than its 600x400 resolution (e.g. on a phone),
    // so convert from on-screen pixels to canvas pixels using its actual size
    function getPos(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width / rect.width;
      const scaleY = canvas.height / rect.height;
      return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
      };
    }

    function startDrawing(x, y) {
      isDrawing = true;
      ctx.globalCompositeOperation = isErasing ? "destination-out" : "source-over";
      ctx.strokeStyle = colorPicker.value;
      ctx.lineWidth = isErasing ? eraserSize.value : brushSize.value;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      lastX = x;
      lastY = y;
      ctx.beginPath();
      ctx.moveTo(lastX, lastY);
    }

    function continueDrawing(x, y) {
      if (!isDrawing) return;
      // curve through the midpoint instead of a straight line, so corners round out
      const midX = (lastX + x) / 2;
      const midY = (lastY + y) / 2;
      ctx.quadraticCurveTo(lastX, lastY, midX, midY);
      ctx.stroke();
      lastX = x;
      lastY = y;
    }

    function stopDrawing() {
      isDrawing = false;
    }

    eraserButton.addEventListener("click", function() {
      isErasing = !isErasing;
      eraserButton.textContent = isErasing ? "Draw" : "Eraser";
    });

    fillButton.addEventListener("click", function() {
      ctx.globalCompositeOperation = "source-over";
      ctx.fillStyle = colorPicker.value;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    });

    canvas.addEventListener("mousedown", function(event) {
      const pos = getPos(event.clientX, event.clientY);
      startDrawing(pos.x, pos.y);
    });

    canvas.addEventListener("mousemove", function(event) {
      const pos = getPos(event.clientX, event.clientY);
      continueDrawing(pos.x, pos.y);
    });

    canvas.addEventListener("mouseup", stopDrawing);
    canvas.addEventListener("mouseleave", stopDrawing);

    canvas.addEventListener("touchstart", function(event) {
      event.preventDefault();
      const touch = event.touches[0];
      const pos = getPos(touch.clientX, touch.clientY);
      startDrawing(pos.x, pos.y);
    });

    canvas.addEventListener("touchmove", function(event) {
      event.preventDefault();
      const touch = event.touches[0];
      const pos = getPos(touch.clientX, touch.clientY);
      continueDrawing(pos.x, pos.y);
    });

    canvas.addEventListener("touchend", function(event) {
      event.preventDefault();
      stopDrawing();
    });
  </script>
</body>
</html>
